<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponder - JS Variables and Constants</title>

    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="styles/js-variables.css">
    
    <script>
        // Javascript land
        
        // let the keyword for a variable
        /*
        multiline comment
        works for blocks of comments
        */ 
        let name = "Calvin Griffiths";
        let age = 19;

        age = age + 1;

        // this works like print in Python
        console.log(age);

        // Constant means the variable CANNOT change after the fact
        const NAME_OF_THE_CHURCH = "The Church of Jesus Christ of Latter-day Saints";


        console.log(NAME_OF_THE_CHURCH);

        if(name === "Calvin Griffiths") {
            let greeting = "Welcome back, Calvin!";
        }

        // console.log(greeting); // this will cause an error because greeting is only defined in the if block

    </script>
</head>
<body>
    
    <h1>JavaScript Variables and Constants</h1>

    <!-- Image displayed on the page -->
    <img src="images/code.png" alt="JavaScript Code Screenshot" class="code-image">

</body>
</html>
